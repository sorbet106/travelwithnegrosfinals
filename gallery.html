<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery — Negros Occidental</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<div class="page-banner" style="background-image:url('images/landscape.jpg');">
  <div class="page-banner-overlay"></div>
  <div class="container-xl text-center">
    <div class="breadcrumb-custom mb-3"><a href="index.html">Home</a><span class="current"> / Gallery</span></div>
    <h1>Photo Gallery</h1>
    <p>A visual journey through the landscapes, festivals, food, and people of Negros Occidental.</p>
  </div>
</div>

<section style="background:var(--cream);padding:32px 0 16px;">
  <div class="container-xl">
    <div class="d-flex gap-2 flex-wrap justify-content-center" id="galleryFilterBtns">
      <button class="filter-btn active" data-gcat="All">All Photos</button>
      <button class="filter-btn" data-gcat="Nature"><i class="bi bi-tree me-1"></i>Nature</button>
      <button class="filter-btn" data-gcat="Beach"><i class="bi bi-water me-1"></i>Beach &amp; Island</button>
      <button class="filter-btn" data-gcat="Heritage"><i class="bi bi-building me-1"></i>Heritage</button>
      <button class="filter-btn" data-gcat="Festival"><i class="bi bi-star me-1"></i>Festivals</button>
      <button class="filter-btn" data-gcat="Food"><i class="bi bi-cup-hot me-1"></i>Food</button>
    </div>
    <p class="text-center mt-3" style="font-size:0.8rem;color:var(--text-muted);">Click any photo to view it in full size &nbsp;|&nbsp; <span id="galleryCount"></span></p>
  </div>
</section>

<section class="section-py" style="padding-top:20px;background:var(--cream);">
  <div class="container-xl">
    <div class="gallery-grid" id="galleryGrid"></div>
    <div id="noGalleryResults" style="display:none;text-align:center;padding:60px 20px;color:var(--text-muted);">
      <i class="bi bi-images" style="font-size:3rem;display:block;margin-bottom:12px;"></i>
      <p>No photos in this category.</p>
    </div>
  </div>
</section>

<div class="lightbox-backdrop" id="lightbox">
  <div class="lightbox-img-wrap">
    <button class="lightbox-close" id="lightboxClose"><i class="bi bi-x-lg"></i></button>
    <button class="lightbox-nav prev" id="lightboxPrev"><i class="bi bi-chevron-left"></i></button>
    <img id="lightboxImg" src="" alt="">
    <button class="lightbox-nav next" id="lightboxNext"><i class="bi bi-chevron-right"></i></button>
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="styles/main.js"></script>
<script>
  renderNavbar();
  renderFooter();

  const galleryImages = [
    // Nature
    { src: 'images/landscape.jpg',    caption: 'Negros Occidental Landscape',       cat: 'Nature'   },
    { src: 'images/mambukal.jpg',     caption: 'Mambukal Mountain Resort, Murcia',  cat: 'Nature'   },
    { src: 'images/kanlaon.png',      caption: 'Mt. Kanlaon Natural Park',          cat: 'Nature'   },
    { src: 'images/gawahon.jpg',      caption: 'Gawahon Eco Park, Victorias',       cat: 'Nature'   },
    { src: 'images/gallery.png',      caption: 'Rice Terraces in Negros Occidental',cat: 'Nature'   },
    { src: 'images/tinagong.jpg',     caption: 'Tinagong Dagat, Hinoba-an',         cat: 'Nature'   },
    { src: 'images/capitolpark.jpg',  caption: 'Capitol Park & Lagoon, Bacolod',    cat: 'Nature'   },
    { src: 'images/generaljuan.png',  caption: 'General Juan Araneta Park',         cat: 'Nature'   },
    // Beach & Island
    { src: 'images/lakawonisl.jpg',   caption: 'Lakawon Island, Cadiz City',        cat: 'Beach'    },
    { src: 'images/lakawonresort.jpg',caption: 'Lakawon Island Resort',             cat: 'Beach'    },
    { src: 'images/danjugan.jpg',     caption: 'Danjugan Island Marine Reserve',    cat: 'Beach'    },
    { src: 'images/bulata.jpg',       caption: 'Bulata White Beach, Cauayan',       cat: 'Beach'    },
    { src: 'images/campomanes.jpg',   caption: 'Campomanes Bay, Sipalay City',      cat: 'Beach'    },
    { src: 'images/sugar.jpg',        caption: 'Sugar Beach, Sipalay City',         cat: 'Beach'    },
    { src: 'images/sagay.jpg',        caption: 'Sagay Marine Reserve',              cat: 'Beach'    },
    { src: 'images/carbin.jpg',       caption: 'Carbin Reef, Sagay',                cat: 'Beach'    },
    { src: 'images/jomabo.jpg',       caption: 'Jomabo Island, Escalante',          cat: 'Beach'    },
    { src: 'images/sipaway.jpg',      caption: 'Sipaway Island, San Carlos City',   cat: 'Beach'    },
    { src: 'images/taklong.jpg',      caption: 'Taklong Island, Guimaras nearby',   cat: 'Beach'    },
    { src: 'images/suyac.jpg',        caption: 'Suyac Island Mangrove, Sagay',      cat: 'Beach'    },
    { src: 'images/tanadicang.jpg',   caption: 'Balay ni Tada Dicang ',             cat: 'Heritage' },
    { src: 'images/sancar.jpg',       caption: 'San Carlos City, Negros Occidental',cat: 'Mountains'},
    // Heritage
    { src: 'images/theruins.jpg',     caption: 'The Ruins, Talisay City',           cat: 'Heritage' },
    { src: 'images/ruin.jpg',         caption: 'The Ruins at Night, Talisay',       cat: 'Heritage' },
    { src: 'images/silay.jpg',        caption: 'Silay Heritage Houses',             cat: 'Heritage' },
    { src: 'images/negrense.jpg',     caption: 'Balay Negrense Museum, Silay',      cat: 'Heritage' },
    { src: 'images/hofelina.jpg',     caption: 'Hofilena Art Collection, Silay',    cat: 'Heritage' },
    { src: 'images/francis.jpg',      caption: 'St. Francis Xavier Cathedral, Kabankalan',  cat: 'Heritage' },
    { src: 'images/sansebastian.jpg', caption: 'San Sebastian Cathedral, Bacolod',  cat: 'Heritage' },
    { src: 'images/capitol.jpg',      caption: 'Provincial Capitol, Bacolod',       cat: 'Heritage' },
    { src: 'images/chimney.jpg',      caption: 'Old Sugar Mill Chimneys',           cat: 'Heritage' },
    { src: 'images/talisay.jpg',      caption: 'Talisay City Heritage',             cat: 'Heritage' },
    { src: 'images/teresa.jpg',       caption: 'Santa Teresa Heritage Site',        cat: 'Heritage' },
    // Festival
    { src: 'images/masskara.jpg',     caption: 'MassKara Festival, Bacolod City',   cat: 'Festival' },
    { src: 'images/bailesdeluces.jpg',caption: 'Bailes de Luces Festival',          cat: 'Festival' },
    { src: 'images/kali.jpg',         caption: 'Kali Kalihan Festival, Bago City',  cat: 'Festival' },
    { src: 'images/lacarlota.jpg',    caption: 'Pasalamat Festival, La Carlota',    cat: 'Festival' },
    { src: 'images/panaad.jpg',       caption: 'Panaad sa Negros Festival',         cat: 'Festival' },
    // Food
    { src: 'images/kansi.jpg',        caption: 'Kansi — Bacolod Beef Soup',         cat: 'Food'     },
    { src: 'images/piaya.jpg',        caption: 'Piaya — Negros Flatbread',          cat: 'Food'     },
    { src: 'images/napeleones.jpg',   caption: 'Napoleones — Layered Pastry',       cat: 'Food'     },
    { src: 'images/batchoy.jpg',      caption: 'Batchoy Noodle Soup',               cat: 'Food'     },
    { src: 'images/prawns.jpg',       caption: 'Sagay Prawns',                      cat: 'Food'     },
  ];

  let activeGalleryCat = 'All';
  let filteredImages = [...galleryImages];
  let currentLightboxIndex = 0;

  function renderGallery() {
    const grid = document.getElementById('galleryGrid');
    const noResults = document.getElementById('noGalleryResults');
    const count = document.getElementById('galleryCount');
    grid.innerHTML = '';

    filteredImages = activeGalleryCat === 'All'
      ? galleryImages
      : galleryImages.filter(img => img.cat === activeGalleryCat);

    count.textContent = `${filteredImages.length} photos`;

    if (filteredImages.length === 0) {
      noResults.style.display = 'block';
      return;
    }
    noResults.style.display = 'none';

    filteredImages.forEach((img, i) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.innerHTML = `
        <img src="${img.src}" alt="${img.caption}" loading="lazy">
        <div class="gallery-item-overlay"><i class="bi bi-fullscreen"></i></div>
        <div class="gallery-item-caption">${img.caption}</div>`;
      item.addEventListener('click', () => openLightbox(i));
      grid.appendChild(item);
    });
  }

  function openLightbox(index) {
    currentLightboxIndex = index;
    const img = filteredImages[index];
    document.getElementById('lightboxImg').src = img.src;
    document.getElementById('lightboxCaption').textContent = img.caption;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  });
  document.getElementById('lightboxNext').addEventListener('click', () => {
    currentLightboxIndex = (currentLightboxIndex + 1) % filteredImages.length;
    openLightbox(currentLightboxIndex);
  });
  document.getElementById('lightboxPrev').addEventListener('click', () => {
    currentLightboxIndex = (currentLightboxIndex - 1 + filteredImages.length) % filteredImages.length;
    openLightbox(currentLightboxIndex);
  });
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') { currentLightboxIndex = (currentLightboxIndex + 1) % filteredImages.length; openLightbox(currentLightboxIndex); }
    if (e.key === 'ArrowLeft')  { currentLightboxIndex = (currentLightboxIndex - 1 + filteredImages.length) % filteredImages.length; openLightbox(currentLightboxIndex); }
  });

  document.getElementById('galleryFilterBtns').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('#galleryFilterBtns .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeGalleryCat = btn.dataset.gcat;
    renderGallery();
  });

  renderGallery();
</script>
</body>
</html>
